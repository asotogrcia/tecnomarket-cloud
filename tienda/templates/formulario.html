<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }} - TecnoMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="fw-bold text-dark text-center mb-4">{{ titulo }}</h3>
            
            <!-- Formulario nativo seguro de Django -->
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Guardar Cambios</button>
                    <a href="{% url 'index' %}" class="btn btn-outline-secondary w-100 fw-bold">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
