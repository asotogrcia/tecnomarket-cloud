<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - TecnoMarket Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Acceso Administrativo</h3>
                        <p class="text-muted small">TecnoMarket Cloud - Panel de Control</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Ingresar al Sistema</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'index' %}" class="text-secondary text-decoration-none small">Volver al Catálogo Público</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
